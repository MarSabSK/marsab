<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarSab Admin</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
.login-box { text-align: center; width: 320px; }
input {
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
  width: 100%;
  box-sizing: border-box;
}
button {
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 999px;
  border: none;
  background: #111;
  color: white;
  cursor: pointer;
  width: 100%;
}
.small {
  margin-top: 14px;
  font-size: 13px;
  color: #555;
}
a { color: #111; }
.msg { margin-top: 10px; font-size: 13px; color: #b00020; min-height: 18px; }
.ok { color: #0a7a2f; }
</style>
</head>
<body>

<div class="login-box">
  <h2>Admin vstup</h2>

  <input id="password" type="password" placeholder="Heslo" autocomplete="current-password">
  <button id="loginBtn">Prihlásiť</button>

  <div class="msg" id="msg"></div>

  <div class="small">
    Zabudnuté heslo?
    <a href="#" id="resetLink">Pošlite mi reset link</a>
    <br>
    <span style="opacity:.8;">(zatiaľ sa link vypíše do konzoly servera)</span>
  </div>
</div>

<script src="admin_login.js"></script>
</body>
</html>
